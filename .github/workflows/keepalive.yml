name: Supabase keep-alive
on:
  schedule:
    - cron: '17 2 */3 * *'   # every 3 days, 02:17 UTC
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase RPC to prevent auto-pause
        env:
          KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::error::SUPABASE_ANON_KEY secret is not set"; exit 1
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST 'https://etalzawulnqutscqlxks.supabase.co/rest/v1/rpc/get_portfolio' \
            -H "apikey: $KEY" -H "Authorization: Bearer $KEY" \
            -H 'Content-Type: application/json' \
            -d '{"pid":"keepalive"}')
          echo "HTTP $code"
          [ "$code" = "200" ] || { echo "::error::unexpected status $code"; exit 1; }
          echo "Keep-alive ping OK"
