<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio · พอร์ตของฉัน</title>
<style>
  :root{
    --bg:#fafafa; --surface:#ffffff; --ink:#1a1a1a; --muted:#8a8a8a;
    --line:#ededed; --line2:#e3e3e3; --shadow:0 1px 3px rgba(0,0,0,.05),0 8px 30px rgba(0,0,0,.04);
    /* pastel palette for circles */
    --c1:#cfe3f0; --c2:#d8ecdd; --c3:#f3e2d3; --c4:#e6dcef; --c5:#f5dfe4;
    --c6:#e0ede0; --c7:#efe7d2; --c8:#dce6ee;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"Segoe UI","Sukhumvit Set","Noto Sans Thai",system-ui,sans-serif;
    background:var(--bg); color:var(--ink); line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:920px; margin:0 auto; padding:32px 20px 80px}
  header{display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:8px}
  h1{font-size:22px; font-weight:600; letter-spacing:-.02em}
  .sub{color:var(--muted); font-size:13px; margin-top:2px}
  .tools{display:flex; gap:8px; flex-wrap:wrap}
  button{
    font:inherit; cursor:pointer; border:1px solid var(--line2); background:var(--surface);
    color:var(--ink); border-radius:999px; padding:8px 14px; font-size:13px;
    transition:.15s ease; white-space:nowrap;
  }
  button:hover{border-color:#c8c8c8; background:#fcfcfc}
  button.primary{background:var(--ink); color:#fff; border-color:var(--ink)}
  button.primary:hover{background:#000}
  button.ghost{border-color:transparent; color:var(--muted); padding:8px 10px}
  button.ghost:hover{color:var(--ink); background:#f0f0f0}

  /* ===== Hero: overlapping circles ===== */
  .hero{
    position:relative; background:var(--surface); border:1px solid var(--line);
    border-radius:28px; box-shadow:var(--shadow); padding:28px; margin:22px 0;
    min-height:380px; display:flex; align-items:center; justify-content:center; overflow:hidden;
  }
  .stage{position:relative; width:100%; height:340px}
  .bubble{
    position:absolute; border-radius:50%; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center;
    mix-blend-mode:multiply; cursor:pointer; transition:transform .2s ease, box-shadow .2s ease;
    border:1px solid rgba(0,0,0,.04);
  }
  .bubble:hover{transform:scale(1.04); z-index:50!important}
  .bubble .pct{font-weight:600; letter-spacing:-.02em}
  .bubble .nm{font-size:11px; color:#4a4a4a; max-width:80%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap}
  .bubble .amt{font-size:10px; color:#6a6a6a; margin-top:1px}
  /* center total */
  .center{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:150px; height:150px; border-radius:50%; background:rgba(255,255,255,.82);
    backdrop-filter:blur(3px); border:1.5px solid var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:40; box-shadow:0 4px 20px rgba(0,0,0,.08);
  }
  .center .lbl{font-size:10px; color:var(--muted); letter-spacing:.04em; text-transform:uppercase}
  .center .total{font-size:24px; font-weight:600; letter-spacing:-.03em; margin-top:2px}
  .center .ret{font-size:12px; color:#2b2b2b; margin-top:3px}
  .center .gap{font-size:11px; margin-top:4px; padding:2px 8px; border-radius:999px}
  .gap.ok{background:#e7f3ea; color:#2f7d4a}
  .gap.behind{background:#fceaea; color:#b9434a}

  /* ===== Cards / table ===== */
  .section-h{display:flex; align-items:center; justify-content:space-between; margin:30px 4px 12px}
  .section-h h2{font-size:15px; font-weight:600}
  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:12px}
  .card{background:var(--surface); border:1px solid var(--line); border-radius:18px; padding:16px; box-shadow:var(--shadow)}
  .card .top{display:flex; align-items:center; gap:9px; margin-bottom:10px}
  .dot{width:14px; height:14px; border-radius:50%; flex:none}
  .card .name{font-weight:600; font-size:14px; flex:1}
  .card .tag{font-size:10px; color:var(--muted); border:1px solid var(--line2); padding:1px 7px; border-radius:999px}
  .row{display:flex; justify-content:space-between; font-size:13px; padding:3px 0}
  .row .k{color:var(--muted)}
  .row .need{color:#b9434a; font-weight:600}
  .row .need.done{color:#2f7d4a}
  .card .acts{display:flex; gap:6px; margin-top:10px}
  .card .acts button{padding:5px 10px; font-size:12px}

  /* summary strip */
  .summary{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:4px 0}
  .stat{background:var(--surface); border:1px solid var(--line); border-radius:16px; padding:14px 16px; box-shadow:var(--shadow)}
  .stat .k{font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.04em}
  .stat .v{font-size:20px; font-weight:600; letter-spacing:-.02em; margin-top:3px}
  .stat .v small{font-size:13px; color:var(--muted); font-weight:400}

  /* notes */
  textarea{
    width:100%; min-height:90px; resize:vertical; border:1px solid var(--line2);
    border-radius:14px; padding:12px 14px; font:inherit; font-size:13px; background:var(--surface);
  }
  textarea:focus{outline:none; border-color:#bdbdbd}

  /* ===== Modal ===== */
  .overlay{position:fixed; inset:0; background:rgba(0,0,0,.32); display:none; align-items:center; justify-content:center; z-index:200; padding:20px}
  .overlay.show{display:flex}
  .modal{background:var(--surface); border-radius:22px; width:100%; max-width:380px; padding:22px; box-shadow:0 20px 60px rgba(0,0,0,.2)}
  .modal h3{font-size:16px; margin-bottom:14px}
  .field{margin-bottom:12px}
  .field label{display:block; font-size:12px; color:var(--muted); margin-bottom:5px}
  .field input[type=text],.field input[type=number]{
    width:100%; border:1px solid var(--line2); border-radius:11px; padding:9px 12px; font:inherit; font-size:14px;
  }
  .field input:focus{outline:none; border-color:#bdbdbd}
  .swatches{display:flex; gap:8px; flex-wrap:wrap}
  .swatches .sw{width:26px; height:26px; border-radius:50%; cursor:pointer; border:2px solid transparent}
  .swatches .sw.sel{border-color:var(--ink)}
  .checkrow{display:flex; align-items:center; gap:8px; font-size:13px; margin-top:6px}
  .modal .foot{display:flex; gap:8px; justify-content:flex-end; margin-top:18px}
  .hint{font-size:11px; color:var(--muted); margin-top:4px}

  /* history */
  .hitem{display:flex; gap:10px; padding:10px 8px; border-bottom:1px solid var(--line); font-size:13px}
  .hitem:last-child{border-bottom:none}
  .hitem .hdot{width:8px; height:8px; border-radius:50%; background:var(--ink); margin-top:6px; flex:none; opacity:.55}
  .hitem .htxt{flex:1}
  .hitem .htime{font-size:11px; color:var(--muted); margin-top:2px}
  .hempty{color:var(--muted); font-size:13px; text-align:center; padding:24px 0}

  /* sync */
  .syncline{font-size:11px; margin-top:4px; display:flex; align-items:center; gap:5px}
  .syncline .sd{width:7px; height:7px; border-radius:50%; flex:none}
  .sd.on{background:#2f9e57} .sd.busy{background:#d99a2b} .sd.off{background:#c0c0c0} .sd.err{background:#c74a4a}
  .syncline.on{color:#2f7d4a} .syncline.busy{color:#8a6d2b} .syncline.off{color:var(--muted)} .syncline.err{color:#b9434a}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1 data-i18n="appTitle">พอร์ตของฉัน</h1>
      <div class="sub" id="subline">—</div>
      <div class="syncline" id="syncStatus"></div>
    </div>
    <div class="tools">
      <button class="primary" onclick="openEdit()" data-i18n="addBucket">+ เพิ่มกอง</button>
      <button onclick="openHistory()" data-i18n="history">🕘 ประวัติ</button>
      <button onclick="exportData()" data-i18n="export">Export</button>
      <button onclick="document.getElementById('imp').click()" data-i18n="import">Import</button>
      <button onclick="syncAction()" id="syncBtn">🔗 ซิงค์</button>
      <button onclick="toggleLang()" id="langBtn">TH / EN</button>
      <input type="file" id="imp" hidden accept="application/json" onchange="importData(event)">
    </div>
  </header>

  <!-- HERO -->
  <div class="hero"><div class="stage" id="stage"></div></div>

  <!-- SUMMARY -->
  <div class="summary" id="summary"></div>

  <!-- TARGET CONFIG -->
  <div class="section-h">
    <h2 data-i18n="targetHead">เป้าหมายพอร์ตสิ้นปี</h2>
    <span class="sub" id="targetLine"></span>
  </div>
  <div class="stat" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <label class="k" style="font-size:13px;color:var(--muted)" data-i18n="goalLabel">ต้องมีเงินนอน ≥</label>
    <input type="number" id="goalInput" style="border:1px solid var(--line2);border-radius:11px;padding:8px 12px;font:inherit;width:160px" oninput="setGoal(this.value)">
    <span class="sub" data-i18n="goalUnit">บาท (ไม่นับยอด liquid)</span>
  </div>

  <!-- BUCKETS -->
  <div class="section-h"><h2 data-i18n="bucketsHead">กองเงิน</h2></div>
  <div class="grid" id="grid"></div>

  <!-- NOTES -->
  <div class="section-h"><h2 data-i18n="notesHead">โน้ต (safety room / หนี้ / บันทึกประจำวัน)</h2></div>
  <textarea id="notes" data-i18n-ph="notesPh" placeholder="จดอะไรก็ได้ ไม่ถูกนำไปคำนวณ…" oninput="saveNotes(this.value)"></textarea>
</div>

<!-- HISTORY MODAL -->
<div class="overlay" id="histOverlay">
  <div class="modal" style="max-width:440px">
    <h3 style="display:flex;justify-content:space-between;align-items:center"><span data-i18n="histHead">ประวัติการแก้ไข</span>
      <button class="ghost" style="color:#b9434a" onclick="clearHistory()" data-i18n="clear">ล้าง</button></h3>
    <div id="histList" style="max-height:60vh;overflow:auto;margin:-2px -4px"></div>
    <div class="foot"><button onclick="closeHistory()" data-i18n="close">ปิด</button></div>
  </div>
</div>

<!-- EDIT MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">เพิ่มกอง</h3>
    <div class="field"><label data-i18n="fName">ชื่อกอง</label><input type="text" id="f_name" data-i18n-ph="fNamePh" placeholder="เช่น kept, ETF, K Bank"></div>
    <div class="field"><label data-i18n="fCur">ยอดปัจจุบัน (บาท)</label><input type="number" id="f_cur"></div>
    <div class="field"><label data-i18n="fTarget">ยอดเป้า (บาท) — เว้นว่างได้</label><input type="number" id="f_target"></div>
    <div class="field"><label data-i18n="fRate">ผลตอบแทนต่อปี (%)</label><input type="number" id="f_rate" step="0.1">
      <div class="hint" data-i18n="fRateHint">ติ๊ก liquid ถ้าเป็นเงินไว้ใช้ ไม่คิดผลตอบแทน</div></div>
    <div class="field"><label data-i18n="fColor">สี</label><div class="swatches" id="swatches"></div></div>
    <label class="checkrow"><input type="checkbox" id="f_liquid"> <span data-i18n="fLiquid">เป็นเงิน liquid (ไม่คิดผลตอบแทน)</span></label>
    <label class="checkrow"><input type="checkbox" id="f_auto"> <span data-i18n="fAuto">เป็น ETF (อัพเดต % อัตโนมัติได้)</span></label>
    <div class="foot">
      <button id="delBtn" class="ghost" style="color:#b9434a;margin-right:auto;display:none" onclick="delBucket()" data-i18n="delBucket">ลบกอง</button>
      <button onclick="closeEdit()" data-i18n="cancel">ยกเลิก</button>
      <button class="primary" onclick="saveBucket()" data-i18n="save">บันทึก</button>
    </div>
  </div>
</div>

};
let LANG='th';
function t(k,...a){const v=(I18N[LANG]||I18N.th)[k];return typeof v==='function'?v(...a):v;}
function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n);if(v!=null)el.textContent=v;});
  document.querySelectorAll('[data-i18n-ph]').forEach(el=>{const v=t(el.dataset.i18nPh);if(v!=null)el.placeholder=v;});
  document.documentElement.lang=LANG;
  const lb=document.getElementById('langBtn');if(lb)lb.textContent=LANG==='th'?'TH / EN':'EN / TH';
}
function toggleLang(){LANG=LANG==='th'?'en':'th';state.lang=LANG;save();applyI18n();renderAll();}

/* ค่าเริ่มต้นเป็น "เทมเพลตเปล่า" (ไม่มีข้อมูลเงินจริง) — ข้อมูลจริงอยู่ในคลาวด์ส่วนตัว */
const DEFAULT={
  goal:0,
  lang:'th',
  history:[],
  notes:'',
  buckets:[
    {id:1,name:'เงินสำรอง',cur:0,target:0,rate:0,liquid:true,auto:false,color:'--c1'},
    {id:2,name:'ออมทรัพย์',cur:0,target:0,rate:0,liquid:false,auto:false,color:'--c2'},
    {id:3,name:'ฝากประจำ',cur:0,target:0,rate:1.5,liquid:false,auto:false,color:'--c3'},
    {id:4,name:'ETF / หุ้น',cur:0,target:0,rate:4,liquid:false,auto:true,color:'--c4'},
    {id:5,name:'เงินไว้ใช้ (liquid)',cur:0,target:0,rate:0,liquid:true,auto:false,color:'--c5'},
  ]
};

let state=load();
LANG=state.lang||'th';
let editingId=null, pickedColor='--c1';

function load(){try{const s=JSON.parse(localStorage.getItem(KEY));if(s&&s.buckets){if(!s.history)s.history=[];return s;}return structuredClone(DEFAULT);}catch(e){return structuredClone(DEFAULT);}}
function save(){localStorage.setItem(KEY,JSON.stringify(state));schedulePush();}
function log(msg){state.history.unshift({t:Date.now(),msg});if(state.history.length>300)state.history.pop();}
const baht=n=>new Intl.NumberFormat('th-TH',{maximumFractionDigits:0}).format(Math.round(n));
const cssVar=v=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* ---- calculations ---- */
function calc(){
  let total=0, invested=0, annualReturn=0, liquidTotal=0;
  state.buckets.forEach(b=>{
    total+=+b.cur;
    if(b.liquid){liquidTotal+=+b.cur;}
    else{invested+=+b.cur; annualReturn+=(+b.cur)*(+b.rate)/100;}
  });
  const nonLiquid=total-liquidTotal;
  const avgPct=nonLiquid>0?annualReturn/nonLiquid*100:0;       // %เฉลี่ยของส่วนที่ลงทุน
  const avgPctAll=total>0?annualReturn/total*100:0;            // %เฉลี่ยทั้งพอร์ต
  const gap=state.goal-total;                                  // เป้าสิ้นปีนับรวม liquid
  return {total,invested,liquidTotal,nonLiquid,annualReturn,avgPct,avgPctAll,gap};
}

/* ---- render hero bubbles ---- */
function renderHero(){
  const stage=document.getElementById('stage');
  stage.innerHTML='';
  const c=calc();
  const W=stage.clientWidth||820, H=340, cx=W/2, cy=H/2;
  const max=Math.max(...state.buckets.map(b=>+b.cur),1);
  const n=state.buckets.length;
  const R=Math.min(W,H)*0.27; // orbit radius
  state.buckets.forEach((b,i)=>{
    const size=70+ (+b.cur/max)*78;            // 70..148px
    const ang=(-90 + i*360/n)*Math.PI/180;
    const x=cx+Math.cos(ang)*R - size/2;
    const y=cy+Math.sin(ang)*R - size/2;
    const el=document.createElement('div');
    el.className='bubble';
    el.style.cssText=`width:${size}px;height:${size}px;left:${x}px;top:${y}px;background:${cssVar(b.color)};z-index:${10+i}`;
    const pctSize=Math.max(13,size*0.16);
    el.innerHTML=`<div class="pct" style="font-size:${pctSize}px">${b.liquid?'–':(+b.rate).toFixed(1)+'%'}</div>
      <div class="nm">${b.name}</div><div class="amt">${baht(b.cur)}</div>`;
    el.onclick=()=>openEdit(b.id);
    stage.appendChild(el);
  });
  const gapBehind=c.gap>0;
  const center=document.createElement('div');
  center.className='center';
  center.innerHTML=`<div class="lbl">${t('totalPort')}</div>
    <div class="total">${baht(c.total)}</div>
    <div class="ret">${t('centerRet',c.avgPct.toFixed(2),baht(c.annualReturn))}</div>
    <div class="gap ${gapBehind?'behind':'ok'}">${gapBehind?t('gapBehind',baht(c.gap)):t('gapOk',baht(-c.gap))}</div>`;
  stage.appendChild(center);
}

/* ---- render summary stats ---- */
function renderSummary(){
  const c=calc();
  const need=state.buckets.reduce((s,b)=>{const g=(+b.target||0)-(+b.cur);return s+(g>0?g:0);},0);
  const u=t('bahtU'), loc=LANG==='th'?'th-TH':'en-GB';
  document.getElementById('summary').innerHTML=`
    <div class="stat"><div class="k">${t('sTotal')}</div><div class="v">${baht(c.total)} <small>${u}</small></div></div>
    <div class="stat"><div class="k">${t('sReturn')}</div><div class="v">+${baht(c.annualReturn)} <small>${u} · ${c.avgPct.toFixed(2)}%*</small></div></div>
    <div class="stat"><div class="k">${t('sNeed')}</div><div class="v">${baht(need)} <small>${u}</small></div></div>
    <div class="stat"><div class="k">${t('sGap')}</div><div class="v" style="color:${c.gap>0?'#b9434a':'#2f7d4a'}">${c.gap>0?t('behind')+' '+baht(c.gap):t('over')+' '+baht(-c.gap)} <small>${u}</small></div></div>`;
  document.getElementById('subline').textContent=t('subline',state.buckets.length,new Date().toLocaleDateString(loc));
  document.getElementById('targetLine').textContent=t('targetNote',baht(c.liquidTotal));
}

/* ---- render bucket cards ---- */
function renderGrid(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  state.buckets.forEach(b=>{
    const gap=(+b.target||0)-(+b.cur);
    const ret=b.liquid?0:(+b.cur)*(+b.rate)/100;
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="top">
        <span class="dot" style="background:${cssVar(b.color)}"></span>
        <span class="name">${b.name}</span>
        ${b.liquid?'<span class="tag">liquid</span>':''}${b.auto?'<span class="tag">ETF</span>':''}
      </div>
      <div class="row"><span class="k">${t('rCur')}</span><span>${baht(b.cur)} ฿</span></div>
      <div class="row"><span class="k">${t('rTarget')}</span><span>${b.target?baht(b.target)+' ฿':'—'}</span></div>
      <div class="row"><span class="k">${t('rReturn')}</span><span>${b.liquid?t('noCalc'):(+b.rate).toFixed(1)+'% · +'+baht(ret)+' ฿'}</span></div>
      <div class="row"><span class="k">${t('rNeed')}</span><span class="need ${gap<=0?'done':''}">${b.target?(gap>0?baht(gap)+' ฿':t('done')):'—'}</span></div>
      <div class="acts">
        <button onclick="quickAdd(${b.id})">${t('fill')}</button>
        <button onclick="openEdit(${b.id})">${t('edit')}</button>
      </div>`;
    grid.appendChild(card);
  });
}

function renderAll(){applyI18n();renderHero();renderSummary();renderGrid();
  document.getElementById('goalInput').value=state.goal;
  document.getElementById('notes').value=state.notes||'';
  if(typeof refreshSyncUI==='function')refreshSyncUI();
}

/* ---- actions ---- */
let goalPrev=null;
function setGoal(v){if(goalPrev===null)goalPrev=state.goal;state.goal=+v||0;clearTimeout(setGoal._t);
  setGoal._t=setTimeout(()=>{if(goalPrev!==state.goal){log(t('lgGoal',baht(goalPrev),baht(state.goal)));save();}goalPrev=null;},800);
  save();renderHero();renderSummary();}
function saveNotes(v){state.notes=v;save();}

function quickAdd(id){
  const b=state.buckets.find(x=>x.id===id);
  const v=prompt(t('promptAdd',b.name),'');
  if(v===null)return;
  const s=String(v).replace(/,/g,'').trim();
  if(s==='')return;
  const n=Number(s);
  if(!Number.isFinite(n)){alert(t('badNum'));return;}
  const before=+b.cur;
  b.cur=Math.max(0,before+n);
  log(t('lgFill',b.name,(n>=0?'+':'')+baht(n),baht(b.cur)));
  save();renderAll();
}

function openEdit(id){
  editingId=id||null;
  buildSwatches();
  const m=document.getElementById('modalTitle'), del=document.getElementById('delBtn');
  if(id){
    const b=state.buckets.find(x=>x.id===id);
    m.textContent=t('editTitle');
    f_name.value=b.name; f_cur.value=b.cur; f_target.value=b.target||''; f_rate.value=b.rate;
    f_liquid.checked=b.liquid; f_auto.checked=b.auto; pickedColor=b.color; del.style.display='block';
  }else{
    m.textContent=t('addTitle');
    f_name.value='';f_cur.value='';f_target.value='';f_rate.value='';
    f_liquid.checked=false;f_auto.checked=false;
    pickedColor=PALETTE[state.buckets.length%PALETTE.length]; del.style.display='none';
  }
  markColor();
  document.getElementById('overlay').classList.add('show');
}
function closeEdit(){document.getElementById('overlay').classList.remove('show');}
function buildSwatches(){
  const w=document.getElementById('swatches');w.innerHTML='';
  PALETTE.forEach(c=>{const s=document.createElement('div');s.className='sw';s.dataset.c=c;
    s.style.background=cssVar(c);s.onclick=()=>{pickedColor=c;markColor();};w.appendChild(s);});
}
function markColor(){document.querySelectorAll('.sw').forEach(s=>s.classList.toggle('sel',s.dataset.c===pickedColor));}
function saveBucket(){
  const data={name:f_name.value.trim()||t('newBucket'),cur:+f_cur.value||0,target:+f_target.value||0,
    rate:+f_rate.value||0,liquid:f_liquid.checked,auto:f_auto.checked,color:pickedColor};
  if(editingId){
    const b=state.buckets.find(x=>x.id===editingId);
    const diffs=[];
    if(b.cur!=data.cur)diffs.push(t('dAmt',baht(b.cur),baht(data.cur)));
    if(b.target!=data.target)diffs.push(t('dTarget',baht(b.target),baht(data.target)));
    if(b.rate!=data.rate)diffs.push(t('dRate',(+b.rate).toFixed(1),(+data.rate).toFixed(1)));
    if(b.name!=data.name)diffs.push(t('dName',b.name,data.name));
    if(b.liquid!=data.liquid)diffs.push(data.liquid?t('dSetLiquid'):t('dUnsetLiquid'));
    Object.assign(b,data);
    log(t('lgEdit',data.name,diffs.length?': '+diffs.join(', '):t('lgNoChange')));
  }else{
    data.id=Date.now();state.buckets.push(data);
    log(t('lgAdd',data.name,baht(data.cur)));
  }
  save();closeEdit();renderAll();
}
function delBucket(){if(!editingId)return;if(!confirm(t('confDel')))return;
  const b=state.buckets.find(x=>x.id===editingId);
  log(t('lgDel',b.name,baht(b.cur)));
  state.buckets=state.buckets.filter(x=>x.id!==editingId);save();closeEdit();renderAll();}

/* ---- history modal ---- */
function openHistory(){renderHistory();document.getElementById('histOverlay').classList.add('show');}
function closeHistory(){document.getElementById('histOverlay').classList.remove('show');}
function clearHistory(){if(!confirm(t('confClear')))return;state.history=[];save();renderHistory();}
function renderHistory(){
  const list=document.getElementById('histList');
  if(!state.history.length){list.innerHTML=`<div class="hempty">${t('histEmpty')}</div>`;return;}
  const loc=LANG==='th'?'th-TH':'en-GB';
  list.innerHTML=state.history.map(h=>{
    const d=new Date(h.t);
    const ts=d.toLocaleDateString(loc,{day:'numeric',month:'short',year:'2-digit'})+' '+d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
    return `<div class="hitem"><span class="hdot"></span><div class="htxt">${h.msg}<div class="htime">${ts}</div></div></div>`;
  }).join('');
}

/* ---- export / import ---- */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='portfolio-'+new Date().toISOString().slice(0,10)+'.json';a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;const r=new FileReader();
  r.onload=()=>{try{const d=JSON.parse(r.result);if(!d.buckets)throw 0;if(!d.history)d.history=[];state=d;LANG=state.lang||LANG;log(t('lgImport'));save();renderAll();}catch(_){alert(t('badFile'));}};
  r.readAsText(f);e.target.value='';
}

/* ================= Cloud sync (Supabase, secret-link, no login) ================= */
let syncId=null, pushTimer=null, applyingRemote=false;

function getSyncId(){
  const h=new URLSearchParams(location.hash.slice(1));
  return h.get('s')||localStorage.getItem('portfolio_sync_id')||null;
}
function setSyncStatus(cls,msg){
  const el=document.getElementById('syncStatus');
  el.className='syncline '+cls;
  el.innerHTML=`<span class="sd ${cls}"></span>${msg}`;
  const btn=document.getElementById('syncBtn');
  if(!CLOUD_READY()){btn.style.display='none';return;}
  btn.style.display='';
  btn.textContent=!getAnonKey()?t('syncKey'):(syncId?t('syncCopy'):t('syncCreate'));
}
function refreshSyncUI(){
  if(!CLOUD_READY()){setSyncStatus('off',t('stLocal'));return;}
  if(!getAnonKey()){setSyncStatus('off',t('stNoKey'));return;}
  if(!syncId){setSyncStatus('off',t('stOff'));return;}
  setSyncStatus('on',t('stOn'));
}
function sbHeaders(){const k=getAnonKey();return{apikey:k,Authorization:'Bearer '+k,'Content-Type':'application/json'};}

async function pull(){
  if(!SYNC_ENABLED()||!syncId)return;
  setSyncStatus('busy',t('stBusy'));
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/rpc/get_portfolio`,{
      method:'POST',headers:sbHeaders(),body:JSON.stringify({pid:syncId})});
    if(!r.ok)throw 0;
    const data=await r.json();
    if(data&&data.buckets){
      applyingRemote=true;
      state=data; if(!state.history)state.history=[]; LANG=state.lang||LANG;
      localStorage.setItem(KEY,JSON.stringify(state));
      renderAll();
      applyingRemote=false;
    }else{
      await push(true); // first time: seed remote with local data
    }
    refreshSyncUI();
  }catch(e){setSyncStatus('err',t('stErr'));}
}
function schedulePush(){
  if(!SYNC_ENABLED()||!syncId||applyingRemote)return;
  clearTimeout(pushTimer);
  setSyncStatus('busy',t('stBusy'));
  pushTimer=setTimeout(()=>push(),700);
}
async function push(silent){
  if(!SYNC_ENABLED()||!syncId)return;
  try{
    const r=await fetch(`${SUPABASE_URL}/rest/v1/rpc/save_portfolio`,{
      method:'POST',headers:sbHeaders(),body:JSON.stringify({pid:syncId,pdata:state})});
    if(!r.ok)throw 0;
    if(!silent)refreshSyncUI();
  }catch(e){setSyncStatus('err',t('stErr'));}
}
let loopStarted=false;
function startSyncLoop(){
  if(loopStarted||!SYNC_ENABLED()||!syncId)return;
  loopStarted=true;
  pull();
  setInterval(()=>{if(document.visibilityState==='visible')pull();},20000);
  window.addEventListener('focus',pull);
}
async function syncAction(){
  if(!CLOUD_READY())return;
  if(!getAnonKey()){                          // ครั้งแรก: ขอ anon key แล้วเก็บในเครื่อง
    const k=prompt(t('keyPrompt'),'');
    if(k===null)return;
    if(!k.trim().startsWith('eyJ')){alert(t('keyBad'));return;}
    localStorage.setItem('sb_anon_key',k.trim());
    refreshSyncUI();
    if(syncId){startSyncLoop();return;}       // มีลิงก์อยู่แล้ว → เริ่มดึงข้อมูล
  }
  if(!syncId){
    syncId=(crypto.randomUUID?crypto.randomUUID():Date.now()+''+Math.random().toString(36).slice(2));
    localStorage.setItem('portfolio_sync_id',syncId);
    history.replaceState(null,'',location.pathname+location.search+'#s='+syncId);
    await push(true);
    startSyncLoop();
  }
  const link=location.origin+location.pathname+location.search+'#s='+syncId+'&k='+encodeURIComponent(getAnonKey());
  try{await navigator.clipboard.writeText(link);alert(t('syncCopied')+'\n\n'+link);}
  catch(_){prompt(t('syncClip'),link);}
  refreshSyncUI();
}
function initSync(){
  const h=new URLSearchParams(location.hash.slice(1));
  const kFromLink=h.get('k');                       // ลิงก์อาจพก anon key มาด้วย
  if(kFromLink&&kFromLink.startsWith('eyJ')&&!localStorage.getItem('sb_anon_key')){
    localStorage.setItem('sb_anon_key',kFromLink);
  }
  syncId=getSyncId();
  if(syncId)localStorage.setItem('portfolio_sync_id',syncId);
  refreshSyncUI();
  startSyncLoop();
}

document.getElementById('overlay').addEventListener('click',e=>{if(e.target.id==='overlay')closeEdit();});
document.getElementById('histOverlay').addEventListener('click',e=>{if(e.target.id==='histOverlay')closeHistory();});
window.addEventListener('resize',renderHero);
renderAll();
initSync();
</script>
